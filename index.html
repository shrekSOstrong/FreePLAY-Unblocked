<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreePlay Zone — Unblocked Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #05070f;
      --surface: #0d1220;
      --card: #111827;
      --card-hover: #1a2438;
      --border: #1e2d4a;
      --accent: #00e5ff;
      --accent2: #ff3cac;
      --accent3: #7b2fff;
      --text: #e2e8f0;
      --muted: #64748b;
      --glow: 0 0 20px rgba(0,229,255,0.3);
      --glow2: 0 0 20px rgba(255,60,172,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(5,7,15,0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1.6rem;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .logo span {
      -webkit-text-fill-color: var(--accent2);
    }

    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cat-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .cat-btn:hover, .cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      box-shadow: var(--glow);
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 20px 40px;
    }

    .hero h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .hero h1 .line1 { color: var(--text); }
    .hero h1 .line2 {
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: hueShift 4s linear infinite;
    }

    @keyframes hueShift {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .hero p {
      color: var(--muted);
      font-size: 1.1rem;
      max-width: 500px;
      margin: 0 auto 30px;
    }

    .search-wrap {
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 14px 24px;
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    .search-wrap input::placeholder { color: var(--muted); }

    /* ── GAME GRID ── */
    .section {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 30px 60px;
    }

    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: var(--glow), 0 8px 32px rgba(0,0,0,0.4);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: var(--surface);
      position: relative;
    }

    .card-thumb-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      background: linear-gradient(135deg, var(--surface), var(--card-hover));
    }

    .card-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--accent2);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-body {
      padding: 14px 16px;
    }

    .card-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-tag {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-play-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 14px;
      background: linear-gradient(90deg, var(--accent3), var(--accent));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .card-play-btn:hover { opacity: 0.85; transform: scale(0.98); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 95vw;
      max-width: 1100px;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,229,255,0.15);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-title {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-fullscreen, .btn-close {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .btn-close:hover { background: #c0392b; border-color: #c0392b; }
    .btn-fullscreen:hover { background: var(--accent3); border-color: var(--accent3); }

    .modal-frame {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    .modal-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      min-height: 540px;
    }

    /* Inline canvas game */
    .modal-frame canvas {
      display: block;
      background: #000;
    }

    .modal-frame #game-container {
      width: 100%;
      height: 100%;
      min-height: 540px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    /* ── NO RESULTS ── */
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      display: none;
    }

    .no-results .icon { font-size: 4rem; margin-bottom: 16px; }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 30px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Hidden cards */
    .card.hidden { display: none; }

    @media (max-width: 640px) {
      header { padding: 16px 20px; flex-direction: column; gap: 12px; }
      .logo { font-size: 1.2rem; }
      .section { padding: 16px 16px 40px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      nav { justify-content: center; }
    }
  </style>
</head>

<canvas id="c" width="700" height="480" style="display:block;margin:0 auto;background:#000;max-width:100%"></canvas>
<style>body{background:#000;margin:0;display:flex;align-items:center;justify-content:center;height:100vh}</style>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=c.width,H=c.height,PAD=12,PW=10,PH=80,BALL=10,SPD=5;
let p1={y:H/2-PH/2,s:0},p2={y:H/2-PH/2,s:0};
let bx=W/2,by=H/2,vx=SPD,vy=SPD*(Math.random()<.5?1:-1);
let keys={};
document.addEventListener('keydown',e=>keys[e.key]=true);
document.addEventListener('keyup',e=>keys[e.key]=false);
function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.setLineDash([8,8]);ctx.strokeStyle='#333';ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#0ef';ctx.fillRect(PAD,p1.y,PW,PH);
  ctx.fillStyle='#f0e';ctx.fillRect(W-PAD-PW,p2.y,PW,PH);
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bx,by,BALL,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 36px monospace';ctx.textAlign='center';
  ctx.fillText(p1.s,W/4,50);ctx.fillText(p2.s,3*W/4,50);
  ctx.fillStyle='#555';ctx.font='12px monospace';ctx.fillText('W/S   ↑/↓',W/2,H-10);
}
function update(){
  if(keys['w']||keys['W'])p1.y=Math.max(0,p1.y-6);
  if(keys['s']||keys['S'])p1.y=Math.min(H-PH,p1.y+6);
  if(keys['ArrowUp'])p2.y=Math.max(0,p2.y-6);
  if(keys['ArrowDown'])p2.y=Math.min(H-PH,p2.y+6);
  bx+=vx;by+=vy;
  if(by-BALL<0||by+BALL>H)vy=-vy;
  if(bx-BALL<PAD+PW&&by>p1.y&&by<p1.y+PH){vx=Math.abs(vx);vy+=(by-(p1.y+PH/2))*0.1;}
  if(bx+BALL>W-PAD-PW&&by>p2.y&&by<p2.y+PH){vx=-Math.abs(vx);vy+=(by-(p2.y+PH/2))*0.1;}
  if(bx<0){p2.s++;reset();}if(bx>W){p1.s++;reset();}
}
function reset(){bx=W/2;by=H/2;vx=SPD*(vx>0?-1:1);vy=SPD*(Math.random()<.5?1:-1);}
function loop(){update();draw();requestAnimationFrame(loop);}loop();
<\/script>`,

<canvas id="c" width="480" height="480" style="display:block;margin:0 auto;background:#0a0a0a;max-width:100%"></canvas>
<div style="color:#0ef;font-family:monospace;text-align:center;padding:8px;font-size:14px">Arrow Keys / WASD to move — Space to restart</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const SZ=20,COLS=24,ROWS=24,TICK=120;
let snake,dir,nextDir,food,score,dead,timer;
function init(){snake=[{x:12,y:12},{x:11,y:12},{x:10,y:12}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;dead=false;placeFood();}
function placeFood(){food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
function update(){
  if(dead)return;
  dir=nextDir;
  const head={x:(snake[0].x+dir.x+COLS)%COLS,y:(snake[0].y+dir.y+ROWS)%ROWS};
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){dead=true;return;}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){score++;placeFood();}else{snake.pop();}
}
function draw(){
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,480,480);
  snake.forEach((s,i)=>{
    const t=1-i/snake.length;
    ctx.fillStyle=\`hsl(\${160+i*2},100%,\${40+t*30}%)\`;
    ctx.fillRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2);
  });
  ctx.fillStyle='#ff4466';ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ/2-2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0ef';ctx.font='bold 16px monospace';ctx.textAlign='left';ctx.fillText('Score: '+score,8,20);
  if(dead){ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,480,480);ctx.fillStyle='#f44';ctx.font='bold 40px monospace';ctx.textAlign='center';ctx.fillText('GAME OVER',240,210);ctx.fillStyle='#0ef';ctx.font='20px monospace';ctx.fillText('Score: '+score,240,255);ctx.fillStyle='#aaa';ctx.font='15px monospace';ctx.fillText('Space to restart',240,290);}
}
document.addEventListener('keydown',e=>{
  const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
  if(e.key===' '&&dead){init();}
  if(m[e.key]&&!(m[e.key].x===-dir.x&&m[e.key].y===-dir.y))nextDir=m[e.key];
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
init();setInterval(()=>{update();draw();},TICK);
<\/script>`,

const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=600,H=480,PW=90,PH=12,BR=8,BC=8,BW=62,BH=22,BMARX=10,BMART=50,BGAP=6;
let px=W/2-PW/2,py=H-40,bx,by,vx,vy,launched,lives,score,bricks,lost,won;
const COLORS=['#ff3cac','#7b2fff','#00e5ff','#00ff88','#ffd700','#ff6b35'];
function init(){
  px=W/2-PW/2;bx=W/2;by=py-BR-2;vx=0;vy=0;launched=false;lives=3;score=0;lost=false;won=false;
  bricks=[];
  for(let r=0;r<BR;r++)for(let col=0;col<BC;col++)
    bricks.push({x:BMARX+col*(BW+BGAP),y:BMART+r*(BH+BGAP),alive:true,hp:r<2?2:1,col:COLORS[r%COLORS.length]});
}
function movePad(x){px=Math.max(0,Math.min(W-PW,x-PW/2));}
c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();movePad((e.clientX-r.left)*(W/r.width));});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')px=Math.max(0,px-18);
  if(e.key==='ArrowRight')px=Math.min(W-PW,px+18);
  if(e.key===' '){if(!launched){launched=true;vx=3;vy=-5;}else if(lost||won)init();}
  if(['ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
function update(){
  if(!launched){bx=px+PW/2;return;}
  bx+=vx;by+=vy;
  if(bx-BR<0){bx=BR;vx=Math.abs(vx);}
  if(bx+BR>W){bx=W-BR;vx=-Math.abs(vx);}
  if(by-BR<0){by=BR;vy=Math.abs(vy);}
  if(by+BR>py&&by-BR<py+PH&&bx>px&&bx<px+PW){vy=-Math.abs(vy);vx+=(bx-(px+PW/2))*0.05;}
  if(by>H){lives--;if(lives<=0){lost=true;}else{bx=px+PW/2;by=py-BR-2;launched=false;vx=0;vy=0;}}
  bricks.forEach(b=>{
    if(!b.alive)return;
    if(bx+BR>b.x&&bx-BR<b.x+BW&&by+BR>b.y&&by-BR<b.y+BH){
      b.hp--;if(b.hp<=0)b.alive=false;
      const ox=Math.min(bx+BR-b.x,b.x+BW-(bx-BR));
      const oy=Math.min(by+BR-b.y,b.y+BH-(by-BR));
      if(ox<oy)vx=-vx;else vy=-vy;
      score+=10;
    }
  });
  if(bricks.every(b=>!b.alive))won=true;
}
function draw(){
  ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);
  bricks.forEach(b=>{
    if(!b.alive)return;
    ctx.fillStyle=b.hp>1?'#fff':b.col;
    ctx.beginPath();ctx.roundRect(b.x,b.y,BW,BH,4);ctx.fill();
    ctx.fillStyle=b.hp>1?b.col:'rgba(0,0,0,.3)';
    ctx.font='bold 11px monospace';ctx.textAlign='center';
    if(b.hp>1)ctx.fillText('2',b.x+BW/2,b.y+BH/2+4);
  });
  ctx.fillStyle='#0ef';ctx.beginPath();ctx.roundRect(px,py,PW,PH,6);ctx.fill();
  ctx.beginPath();ctx.arc(bx,by,BR,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.fillStyle='#0ef';ctx.font='bold 15px monospace';ctx.textAlign='left';ctx.fillText('Score: '+score,8,22);
  ctx.fillStyle='#f44';ctx.fillText('Lives: '+'❤️'.repeat(lives),8,42);
  if(!launched&&!lost&&!won){ctx.fillStyle='#aaa';ctx.font='14px monospace';ctx.textAlign='center';ctx.fillText('Space to launch',W/2,H-8);}
  if(lost){ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#f44';ctx.font='bold 44px monospace';ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2-20);ctx.fillStyle='#aaa';ctx.font='16px monospace';ctx.fillText('Space to restart',W/2,H/2+24);}
  if(won){ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#0f8';ctx.font='bold 44px monospace';ctx.textAlign='center';ctx.fillText('YOU WIN!',W/2,H/2-20);ctx.fillStyle='#aaa';ctx.font='16px monospace';ctx.fillText('Space to restart',W/2,H/2+24);}
}
init();function loop(){update();draw();requestAnimationFrame(loop);}loop();
<\/script>`,

    iframe.setAttribute('allowfullscreen', '');
    iframe.style.cssText = 'width:100%;height:100%;min-height:580px;border:none;display:block;';
    modalFrame.appendChild(iframe);
  } else if (game.type === 'builtin') {
    const html = BUILTIN_GAMES[game.game]();
    const container = document.createElement('div');
    container.style.cssText = 'width:100%;min-height:540px;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;';
    container.innerHTML = html;
    modalFrame.appendChild(container);
    container.querySelectorAll('script').forEach(s => {
      const ns = document.createElement('script');
      ns.textContent = s.textContent;
      s.replaceWith(ns);
    });
  }

  overlay.style.display = 'flex';
  overlay.style.alignItems = 'center';
  overlay.style.justifyContent = 'center';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.style.display = 'none';
  modalFrame.innerHTML = '';
  document.body.style.overflow = '';
}

document.getElementById('btnClose').addEventListener('click', closeModal);
overlay.addEventListener('click', e => {
  if (e.target === overlay) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('btnFullscreen').addEventListener('click', () => {
  const iframe = modalFrame.querySelector('iframe');
  const target = iframe || document.getElementById('modal');
  if (target.requestFullscreen) target.requestFullscreen();
  else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
});
</script>
</body>
</html>
