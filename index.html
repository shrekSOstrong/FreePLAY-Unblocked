<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FreePlay Zone — Unblocked Games</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#05070f;--surface:#0d1220;--card:#111827;--card2:#1a2438;--border:#1e2d4a;--accent:#00e5ff;--accent2:#ff3cac;--accent3:#7b2fff;--text:#e2e8f0;--muted:#64748b;--glow:0 0 22px rgba(0,229,255,.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
header{position:sticky;top:0;z-index:100;padding:13px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:1px solid var(--border);background:rgba(5,7,15,.97);backdrop-filter:blur(14px);}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.35rem;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;}
.logo span{-webkit-text-fill-color:var(--accent2);}
nav{display:flex;gap:6px;flex-wrap:wrap;}
.cat-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Exo 2',sans-serif;font-size:.68rem;font-weight:600;padding:5px 12px;border-radius:999px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .2s;}
.cat-btn:hover,.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#000;box-shadow:var(--glow);}
.hero{position:relative;z-index:1;text-align:center;padding:46px 20px 28px;}
.hero h1{font-family:'Orbitron',monospace;font-size:clamp(1.5rem,4vw,3.2rem);font-weight:900;line-height:1.1;margin-bottom:10px;}
.line1{color:var(--text);display:block;}
.line2{display:block;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:hue 5s linear infinite;}
@keyframes hue{to{filter:hue-rotate(360deg);}}
.hero p{color:var(--muted);font-size:.92rem;max-width:440px;margin:0 auto 20px;}
.search-wrap{max-width:400px;margin:0 auto;}
#searchInput{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:11px 20px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s,box-shadow .2s;}
#searchInput:focus{border-color:var(--accent);box-shadow:var(--glow);}
#searchInput::placeholder{color:var(--muted);}
.section{position:relative;z-index:1;max-width:1380px;margin:0 auto;padding:16px 22px 56px;}
.section-title{font-family:'Orbitron',monospace;font-size:.73rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:13px;}
.card{display:block;background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;user-select:none;}
.card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:var(--glow),0 10px 32px rgba(0,0,0,.4);}
.card-thumb{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:2.8rem;background:linear-gradient(135deg,var(--surface),var(--card2));}
.badge{position:absolute;top:9px;right:9px;background:var(--accent2);color:#fff;font-size:.58rem;font-weight:700;padding:3px 7px;border-radius:999px;text-transform:uppercase;letter-spacing:1px;pointer-events:none;}
.card-body{padding:9px 12px 3px;}
.card-title{font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-tag{font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.card-play{display:block;margin:8px 12px 12px;background:linear-gradient(90deg,var(--accent3),var(--accent));border-radius:7px;color:#fff;font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;letter-spacing:2px;padding:8px;text-align:center;pointer-events:none;}
.card:hover .card-play{opacity:.82;}
.card.hidden{display:none!important;}
.no-results{display:none;text-align:center;padding:56px 20px;color:var(--muted);}
.no-results .icon{font-size:3.6rem;margin-bottom:12px;}
footer{position:relative;z-index:1;text-align:center;padding:22px;border-top:1px solid var(--border);color:var(--muted);font-size:.73rem;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(max-width:600px){header{padding:11px 13px;}nav{justify-content:center;}.section{padding:11px 11px 36px;}.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;}}

/* ── GAME OVERLAY ── */
#gameOverlay{display:none;position:fixed;inset:0;z-index:9999;flex-direction:column;background:#000;}
#gameOverlay.open{display:flex;}
#overlayBar{display:flex;align-items:center;gap:10px;padding:0 14px;height:44px;min-height:44px;background:#080814;border-bottom:1px solid var(--border);flex-shrink:0;}
#overlayTitle{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;color:var(--accent);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.obtn{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Exo 2',sans-serif;font-size:.72rem;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0;}
.obtn:hover{background:var(--card2);}
#btnFS:hover{background:var(--accent3);border-color:var(--accent3);}
#btnClose:hover{background:#b91c1c;border-color:#b91c1c;}
#gameFrame{flex:1;width:100%;border:none;display:block;background:#000;}
</style>

    'if(keys["Space"]&&!keys["Space"]._used){keys["Space"]._used=true;' +
    'bullets.push({x:ship.x+Math.cos(ship.a)*16,y:ship.y+Math.sin(ship.a)*16,vx:Math.cos(ship.a)*9+ship.vx,vy:Math.sin(ship.a)*9+ship.vy,life:60});}' +
    'if(!keys["Space"])keys["Space"]._used=false;' +
    'bullets.forEach(function(b){b.x=(b.x+b.vx+W)%W;b.y=(b.y+b.vy+H)%H;b.life--;});' +
    'bullets=bullets.filter(function(b){return b.life>0;});' +
    'asts.forEach(function(a){a.x=(a.x+a.vx+W)%W;a.y=(a.y+a.vy+H)%H;a.a+=a.va;});' +
    'for(var i=bullets.length-1;i>=0;i--){for(var j=asts.length-1;j>=0;j--){' +
    'var b=bullets[i],a=asts[j],dx=b.x-a.x,dy=b.y-a.y;' +
    'if(Math.sqrt(dx*dx+dy*dy)<a.r){bullets.splice(i,1);' +
    'sc+=a.r>60?10:a.r>30?20:50;' +
    'if(a.r>30){spawnAst(a.r*.55,a.x+rnd(-20,20),a.y+rnd(-20,20));spawnAst(a.r*.55,a.x+rnd(-20,20),a.y+rnd(-20,20));}' +
    'asts.splice(j,1);break;}}}' +
    'if(ship.inv<=0){for(var k=0;k<asts.length;k++){var a=asts[k],dx=ship.x-a.x,dy=ship.y-a.y;if(Math.sqrt(dx*dx+dy*dy)<a.r-4){lives--;ship.inv=120;if(lives<=0){st="dead";}}}}' +
    'if(asts.length===0){for(var i=0;i<6;i++)spawnAst(80,rnd(0,W),rnd(0,H/3));}}' +
    'function drawAst(a){ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.a);ctx.beginPath();' +
    'a.pts.forEach(function(r,i){var ang=i/a.pts.length*Math.PI*2;i===0?ctx.moveTo(Math.cos(ang)*a.r*r,Math.sin(ang)*a.r*r):ctx.lineTo(Math.cos(ang)*a.r*r,Math.sin(ang)*a.r*r);});' +
    'ctx.closePath();ctx.strokeStyle="#8892b0";ctx.lineWidth=1.5;ctx.stroke();ctx.restore();}' +
    'function draw(){ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);' +
    'asts.forEach(drawAst);' +
    'bullets.forEach(function(b){ctx.fillStyle="#00e5ff";ctx.beginPath();ctx.arc(b.x,b.y,2.5,0,Math.PI*2);ctx.fill();});' +
    'if(ship.inv%8<5){ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.a);ctx.beginPath();ctx.moveTo(16,0);ctx.lineTo(-10,10);ctx.lineTo(-5,0);ctx.lineTo(-10,-10);ctx.closePath();ctx.strokeStyle="#00e5ff";ctx.lineWidth=1.8;ctx.stroke();' +
    'if(keys["ArrowUp"]){ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(-14+(Math.random()*6-3),Math.random()*8-4);ctx.strokeStyle="#ff6b35";ctx.lineWidth=2;ctx.stroke();}ctx.restore();}' +
    'ctx.fillStyle="#00e5ff";ctx.font="bold 15px monospace";ctx.textAlign="left";ctx.fillText("Score: "+sc,8,22);' +
    'ctx.fillStyle="#ff3cac";ctx.fillText("Lives: "+"♥ ".repeat(lives).trim(),8,42);' +
    'if(st==="dead"){ctx.fillStyle="rgba(0,0,0,.7)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#ff3cac";ctx.font="bold 38px monospace";ctx.textAlign="center";ctx.fillText("GAME OVER",W/2,H/2-20);ctx.fillStyle="#00e5ff";ctx.font="18px monospace";ctx.fillText("Score: "+sc,W/2,H/2+14);ctx.fillStyle="#64748b";ctx.font="14px monospace";ctx.fillText("Refresh to restart",W/2,H/2+42);}}' +
    'initGame();function loop(){update();draw();requestAnimationFrame(loop);}loop();<\/script>';

  if (id === 'reaction') return '<style>body{background:#05070f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:Orbitron,monospace;color:#e2e8f0;text-align:center;padding:24px;}</style>' +
    '<h2 style="color:#00e5ff;margin-bottom:8px;font-size:1.4rem">REACTION TIME</h2>' +
    '<p style="color:#64748b;font-size:.82rem;margin-bottom:26px">Click / tap when the box turns GREEN</p>' +
    '<div id="box" style="width:300px;height:240px;border-radius:18px;background:#0d1220;border:2px solid #1e2d4a;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:#64748b;transition:background .1s" onclick="handleClick()">Click to start</div>' +
    '<div id="hist" style="color:#94a3b8;font-size:.8rem;margin-top:18px;min-height:50px"></div>' +
    '<script>var st="idle",t0,timer,res=[];' +
    'function handleClick(){if(st==="idle"||st==="result")start();else if(st==="wait"){early();}else if(st==="go"){register();}}' +
    'function start(){clearTimeout(timer);st="wait";setBox("#0d1220","#1e2d4a","Get ready...");timer=setTimeout(go,1500+Math.random()*3000);}' +
    'function go(){st="go";t0=Date.now();setBox("#00c851","#00c851","<span style=\'color:#000;font-size:1.3rem;font-weight:900\'>CLICK!</span>");}' +
    'function early(){clearTimeout(timer);st="result";setBox("#b91c1c","#b91c1c","Too early!<br><span style=\'font-size:.75rem;color:#fca5a5\'>Click to retry</span>");}' +
    'function register(){var ms=Date.now()-t0;res.push(ms);if(res.length>6)res.shift();st="result";var avg=Math.round(res.reduce(function(a,b){return a+b;},0)/res.length);' +
    'setBox("#05070f","#00e5ff","<span style=\'color:#00e5ff;font-size:1.5rem\'>"+ms+"ms</span>");' +
    'document.getElementById("hist").innerHTML="Last: "+res.join(" | ")+"ms<br>Avg: "+avg+"ms<br><span style=\'color:#7b2fff;font-size:.7rem\'>Click to try again</span>";}' +
    'function setBox(bg,border,html){var b=document.getElementById("box");b.style.background=bg;b.style.borderColor=border;b.innerHTML=html;}<\/script>';

  return '<div style="color:#fff;display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace">Game not found</div>';
}

// ─────────────────────────────────────────────────────────────
// OVERLAY LOGIC
// ─────────────────────────────────────────────────────────────
var overlay   = document.getElementById('gameOverlay');
var frameEl   = document.getElementById('gameFrame');
var titleEl   = document.getElementById('overlayTitle');
var currentGame = null;

function openGame(game) {
  currentGame = game;
  titleEl.textContent = game.title;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (game.type === 'js') {
    // Build a self-contained HTML page in a blob URL — zero external requests, always works
    var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{margin:0;padding:0;box-sizing:border-box;}html,body{width:100%;height:100%;overflow:hidden;}</style></head><body>' + makeGame(game.game) + '</body></html>';
    var blob = new Blob([html], {type:'text/html'});
    var url  = URL.createObjectURL(blob);
    frameEl.src = url;
    // Revoke after load to free memory
    frameEl.onload = function() { URL.revokeObjectURL(url); frameEl.onload = null; };
  } else {
    frameEl.src = game.url;
  }
}

function closeOverlay() {
  overlay.classList.remove('open');
  frameEl.src = 'about:blank';
  document.body.style.overflow = '';
}

document.getElementById('btnClose').onclick = closeOverlay;
document.getElementById('btnReload').onclick = function() {
  if (currentGame) openGame(currentGame);
};
document.getElementById('btnFS').onclick = function() {
  var el = frameEl;
  (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
};
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && overlay.classList.contains('open')) closeOverlay();
});

// ─────────────────────────────────────────────────────────────
// BUILD GRID
// ─────────────────────────────────────────────────────────────
var gameGrid = document.getElementById('gameGrid');

function buildGrid() {
  gameGrid.innerHTML = '';
  for (var i = 0; i < GAMES.length; i++) {
    (function(game) {
      var div = document.createElement('div');
      div.className = 'card';
      div.setAttribute('data-cat', game.cat);
      div.setAttribute('data-title', game.title.toLowerCase());
      div.innerHTML =
        '<div class="card-thumb">' + game.emoji + '</div>' +
        (game.badge ? '<div class="badge">' + game.badge + '</div>' : '') +
        '<div class="card-body"><div class="card-title">' + game.title + '</div>' +
        '<div class="card-tag">' + game.cat + '</div></div>' +
        '<div class="card-play">▶ PLAY NOW</div>';
      div.onclick = function() { openGame(game); };
      gameGrid.appendChild(div);
    })(GAMES[i]);
  }
}

// ─────────────────────────────────────────────────────────────
// FILTER + SEARCH
// ─────────────────────────────────────────────────────────────
var activeCat = 'all', searchTerm = '';

function applyFilters() {
  var cards = gameGrid.querySelectorAll('.card'), count = 0;
  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    var catOk = activeCat === 'all' || c.getAttribute('data-cat') === activeCat;
    var searchOk = !searchTerm || c.getAttribute('data-title').indexOf(searchTerm) !== -1 || c.getAttribute('data-cat').indexOf(searchTerm) !== -1;
    if (catOk && searchOk) { c.classList.remove('hidden'); count++; } else c.classList.add('hidden');
  }
  document.getElementById('noResults').style.display = count === 0 ? 'block' : 'none';
  var label = activeCat === 'all' ? 'All Games' : activeCat.charAt(0).toUpperCase() + activeCat.slice(1);
  document.getElementById('sectionTitle').textContent = label + ' \u2014 ' + count + ' Games';
}

document.getElementById('catNav').onclick = function(e) {
  var btn = e.target;
  if (!btn.classList.contains('cat-btn')) return;
  var all = this.querySelectorAll('.cat-btn');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
  btn.classList.add('active');
  activeCat = btn.getAttribute('data-cat');
  applyFilters();
};

document.getElementById('searchInput').oninput = function() {
  searchTerm = this.value.toLowerCase().trim();
  applyFilters();
};

buildGrid();
applyFilters();
</script>
</body>
</html>
